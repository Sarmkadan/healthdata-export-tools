version: '3.8'

services:
  healthdata-exporter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthdata-export-tools
    volumes:
      # Mount directories for data access
      - ./exports:/data/exports:ro
      - ./output:/data/output
      - ./healthdata.db:/data/healthdata.db
    environment:
      # .NET runtime configuration
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - DOTNET_gcServer=1
      - DOTNET_gcConcurrent=1
      - ASPNETCORE_ENVIRONMENT=Production

      # Application configuration
      - INPUT_PATH=/data/exports
      - OUTPUT_PATH=/data/output
      - DATABASE_PATH=/data/healthdata.db
      - EXPORT_FORMAT=All
      - VERBOSE_LOGGING=false
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

    # Health check
    healthcheck:
      test: ["CMD-SHELL", "dotnet /app/healthdata-export-tools.dll /tmp/test-input /tmp/test-output /tmp/test.db 2>&1 | grep -q '✅ Export completed successfully'"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 15s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      service: healthdata-exporter
      version: "1.0.0"

# Volumes for persistent data
volumes:
  postgres_data:
    driver: local

# Networks for service communication
networks:
  healthdata-network:
    driver: bridge